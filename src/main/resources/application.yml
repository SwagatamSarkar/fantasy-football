spring:
  application:
    name: fantasy-football

  datasource:
    url: jdbc:h2:mem:fantasydb
    driverClassName: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true  # ← ADD THIS LINE
    show-sql: false

server:
  port: 8080